model:
  name: mlp
  hidden_dim: 128
  dropout: 0.1
optimizer:
  name: adam
  weight_decay: 0.0
project:
  name: ddp-hydra-wandb-demo
train:
  epochs: 5
  batch_size_per_gpu: 64
  lr: 0.001
  seed: 42
  num_workers: 2
data:
  input_dim: 128
  num_classes: 10
  train_size: 5000
  val_size: 1000
logging:
  log_every_steps: 20
checkpoint:
  dir: checkpoints
