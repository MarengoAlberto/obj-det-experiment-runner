obj_loss: bce       # "focal" | "bce"
cls_loss: ce      # "focal" | "ce" | "bce"
box_loss: s1         # "s1" | "l1" | "giou" | "diou" | "ciou" | "hybrid_s1_ciou" | "hybrid_s1_diou"
lambda_obj: 2.0
lambda_cls: 1.0
lambda_bbox: 3.0
focal_alpha: 0.25
focal_gamma: 1.5
apply_negative_mining: true
obj_neg_weight: 1.0
s1_beta: 0.5
s1_reduction: mean # "mean" | "sum" | "custom_stride_weighted"
hybrid_xiou_weight: 0.5

stride_weight:
  base: 16.0
  min: 0.75
  max: 3.0