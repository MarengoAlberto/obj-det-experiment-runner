defaults:
  - model: mlp
  - optimizer: adam
  - dataset: data
  - _self_

project:
  name: ddp-hydra-wandb-demo

train:
  epochs: 5
  batch_size: 64
  lr: 0.001
  seed: 42
  num_workers: 2

data:
  input_dim: 128
  num_classes: 10
  train_size: 5000
  val_size: 1000

logging:
  log_every_steps: 20

checkpoint:
  dir: checkpoints

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}