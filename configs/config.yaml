defaults:
  - model: fpn
  - optimizer: adamw
  - scheduler: cosine_warmup
  - dataset: data
  - experiment: baseline
  - loss@loss.loc_loss: iou
  - loss@loss.cls_loss: focal
  - _self_

project:
  name: ddp-fpn-v1
  entity: ddp-experiment

metric: torch_mAP

logging:
  log_every_steps: 20

checkpoint:
  dir: checkpoints
  version: version_0

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}